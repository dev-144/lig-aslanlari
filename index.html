    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            min-height: 100vh;
        }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .card-shadow {
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }
        .border-soft { border: 1px solid #eef2f6; }
        .store-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 12px;
            background: #ffffff;
            border: 1px solid #f1f5f9;
            margin-bottom: 5px;
            transition: all 0.15s;
            gap: 8px;
        }
        .store-row:hover { border-color: #cbd5e1; box-shadow: 0 4px 8px -4px rgba(0,0,0,0.05); }
        .platinum-border { border-top: 4px solid #94a3b8; }
        .gold-border { border-top: 4px solid #eab308; }
        .silver-border { border-top: 4px solid #94a3b8; }
        .bronze-border { border-top: 4px solid #b45309; }

        /* Genel lider çerçevesi (Kale Center) */
        .top-leader {
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), inset 0 0 5px rgba(59, 130, 246, 0.2) !important;
            background: #f0f9ff !important;
        }

        /* Responsive düzenlemeler */
        @media (max-width: 640px) {
            .store-row {
                flex-wrap: wrap;
                gap: 4px;
            }
            .store-name {
                max-width: 100% !important;
            }
            .progress-area {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>

            'Erzurum MNG Avm', 'Kocaeli Gebze Center', 'Tokat Novada', 'Ordu Novada', 'Adana 01 Burda',
            'Balıkesir Edremit Kipa', 'Amasya Park Avm', 'Denizli Çamlık', 'Bursa Anatolium', 'Muğla Bodrum Oasis AVM',
            'Uşak Festiva AVM', 'Sinop İtfaiye Cadde', 'Karabük Kares Avm', 'Rize Şimal Avm', 'Nevşehir Nissara',
            'Kastamonu Barutçuoğlu AVM', 'Kırklareli Lüleburgaz 39 Burda', 'Reeder Store Samsun'
        ];

        function sortByFullOrder(leagueSet) {
            return FULL_ORDER.filter(name => leagueSet.has(name));
        }

        const platinumOrder = sortByFullOrder(PLATINUM_STORES);
        const goldOrder = sortByFullOrder(GOLD_STORES);
        const silverOrder = sortByFullOrder(SILVER_STORES);
        const bronzeOrder = sortByFullOrder(BRONZE_STORES);

        let stores = [];
        function addOrdered(list, league) {
            list.forEach(name => {
                const rev = revenueData[name] || 0;
                const oldRev = oldRevenueData[name] || 0;
                let trend = 'same';
                if (rev > oldRev) trend = 'up';
                else if (rev < oldRev) trend = 'down';
                stores.push({
                    name, league,
                    weeklyRevenue: rev,
                    weeklyTarget: TARGETS[league],
                    isAcademy: ACADEMY_STORES.has(name),
                    trend,
                    isTopLeader: name === topLeaderName
                });
            });
        }
        addOrdered(platinumOrder, 'A');
        addOrdered(goldOrder, 'B');
        addOrdered(silverOrder, 'C');
        addOrdered(bronzeOrder, 'D');

        const platinum = stores.filter(s => s.league === 'A');
        const gold = stores.filter(s => s.league === 'B');
        const silver = stores.filter(s => s.league === 'C');
        const bronze = stores.filter(s => s.league === 'D');

        function renderLeague(containerId, storesArray, isTopLeague = false) {
            const container = document.getElementById(containerId);
            let html = '';
            storesArray.forEach((s, idx) => {
                const progress = s.weeklyTarget > 0 ? Math.min(100, (s.weeklyRevenue / s.weeklyTarget) * 100) : 0;
                const achieved = progress >= 100;
                let trendIcon = '';
                if (s.trend === 'up') trendIcon = '<span class="text-emerald-500 text-sm font-bold">↑</span>';
                else if (s.trend === 'down') trendIcon = '<span class="text-rose-500 text-sm font-bold">↓</span>';
                else trendIcon = '<span class="text-gray-400 text-sm font-bold">→</span>';

                const academyBadge = s.isAcademy ? ' 🎓' : '';
                const isTop3 = idx < 3;
                const rowBg = isTop3 ? 'bg-amber-50 border-amber-200' : 'bg-white';
                const leaderClass = s.isTopLeader ? 'top-leader' : '';
                const nameClass = isTop3 ? 'text-amber-700 font-semibold' : 'text-gray-700';

                html += `
                    <div class="store-row ${rowBg} ${leaderClass}">
                        <div class="flex items-center gap-1 min-w-0 flex-1">
                            <span class="text-xs md:text-sm font-medium truncate ${nameClass}" title="${s.name}">
                                ${s.name}${academyBadge}
                            </span>
                            ${trendIcon}
                        </div>
                        <div class="flex items-center gap-2 sm:gap-3 progress-area">
                            <span class="text-xs font-bold text-gray-800 text-right">%${progress.toFixed(0)}</span>
                            <div class="w-12 md:w-16 bg-gray-200 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-1.5 rounded-full" style="width:${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        renderLeague('platinumList', platinum, true);
        renderLeague('goldList', gold, true);
        renderLeague('silverList', silver, false);
        renderLeague('bronzeList', bronze, false);

        // KPI
        const achievers = stores.filter(s => s.weeklyTarget > 0 && (s.weeklyRevenue / s.weeklyTarget) >= 1).length;
        const avgProgress = stores.length ? stores.reduce((a,b)=>a+(b.weeklyTarget>0?(b.weeklyRevenue/b.weeklyTarget)*100:0),0)/stores.length : 0;
        document.getElementById('kpiContainer').innerHTML = `
            <div class="bg-white rounded-2xl p-3 md:p-5 card-shadow border-soft flex justify-between items-center">
                <div><div class="text-gray-500 text-xs md:text-sm font-medium uppercase">Hedefi Aşan</div><div class="text-2xl md:text-3xl font-bold text-gray-800">${achievers} / ${stores.length}</div></div>
                <div class="text-2xl md:text-3xl text-emerald-500">🎯</div>
            </div>
            <div class="bg-white rounded-2xl p-3 md:p-5 card-shadow border-soft flex justify-between items-center">
                <div><div class="text-gray-500 text-xs md:text-sm font-medium uppercase">Ort. Gerçekleşme</div><div class="text-2xl md:text-3xl font-bold text-gray-800">%${avgProgress.toFixed(1)}</div></div>
                <div class="text-2xl md:text-3xl text-purple-500">📊</div>
            </div>
        `;
    })();
</script>
</body>
</html>
