<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mayıs 2026 - Hedef Ligleri | Platin · Altın · Gümüş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafd;
            font-family: 'Inter', sans-serif;
            padding: 40px 24px 60px;
            color: #1e293b;
        }

        .league-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .hero h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #b8860b;
            margin-right: 12px;
        }
        .hero p {
            font-size: 1.1rem;
            color: #475569;
            margin-top: 12px;
            border-top: 1px dashed #cbd5e1;
            display: inline-block;
            padding-top: 12px;
            font-weight: 500;
        }

        /* Ligler yan yana */
        .leagues-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }

        .league-card {
            flex: 1 1 300px;
            min-width: 280px;
            background: #ffffff;
            border-radius: 32px;
            padding: 24px 20px 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.2s ease, box-shadow 0.3s;
            border: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
        }
        .league-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 36px rgba(0,0,0,0.08);
        }

        .league-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 14px;
        }
        .league-icon {
            font-size: 2.8rem;
        }
        .league-title h2 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .league-title span {
            font-size: 0.75rem;
            background: #eef2f6;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #1e293b;
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .team-row {
            background: #f9fbfd;
            border-radius: 18px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid #eef2f7;
            gap: 12px;
        }
        .team-row:hover {
            background: #f1f5fe;
            border-color: #cbd5e1;
            transform: scale(1.01);
        }
        .team-name {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            color: #1e293b;
        }
        .team-name i {
            color: #b8860b;
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
        }
        .badge-rank {
            background: #e6edf6;
            border-radius: 60px;
            padding: 2px 8px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #1e293b;
        }

        /* İlerleme çubuğu */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 110px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 7px;
            background: #e9eef3;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            background: #47E10C; /* R:71 G:225 B:12 yeşil */
            transition: width 0.4s ease;
        }
        .percentage-text {
            font-weight: 700;
            font-size: 0.8rem;
            color: #1e293b;
            white-space: nowrap;
        }

        /* Liglere özel üst çizgi ve ikon renkleri */
        .league-card.platinum { border-top: 5px solid #62748c; }
        .league-card.gold { border-top: 5px solid #d4af37; }
        .league-card.silver { border-top: 5px solid #8c97a6; }

        .platinum .league-icon i { color: #62748c; }
        .gold .league-icon i { color: #d4af37; }
        .silver .league-icon i { color: #8c97a6; }

        @media (max-width: 900px) {
            .leagues-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .league-card {
                min-width: auto;
            }
            body {
                padding: 20px 16px;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .team-row {
                flex-wrap: wrap;
            }
            .progress-wrapper {
                min-width: 90px;
            }
        }
    </style>
</head>
<body>

<div class="league-container">

        <h1><i class="fas fa-layer-group"></i> HEDEF LİGLERİ · MAYIS 2026</h1>
        <p><i class="fas fa-chart-line"></i> Platin, Altın ve Gümüş Ligler — hedef gerçekleşme yüzdeleri</p>

    <div class="leagues-grid" id="leaguesGrid">

</div>

        { name: "İstanbul 212 Outlet", goal: 1185000 },

        { name: "Denizli Çamlık", goal: 1200000 },
        { name: "Konya Novaland", goal: 1200000 },
        { name: "Yalova Vega Avm", goal: 1200000 },
        { name: "Eskişehir Espark Avm", goal: 1200000 },
        { name: "Balıkesir 10 Burda", goal: 1250000 },
        { name: "Manisa Novada Akhisar", goal: 1250000 },
        { name: "Malatya Park", goal: 1250000 },
        { name: "Diyarbakır Ceylan Karavil Park Avm", goal: 1250000 },
        { name: "Adana 01 Burda", goal: 1250000 },
        { name: "Kahramanmaraş Piazza", goal: 1250000 },
        { name: "İstanbul Atlaspark", goal: 1250000 },
        { name: "Ordu Novada", goal: 1250000 },
        { name: "Balıkesir Bandırma Liman Avm", goal: 1350000 },
        { name: "İzmir Point Bornova", goal: 1350000 },
        { name: "Hatay İskenderun Forbes Avm", goal: 1350000 },
        { name: "İstanbul Canpark", goal: 1350000 },

        { name: "Gaziantep Forum", goal: 1350000 },

        { name: "Manisa Magnesia", goal: 1375000 },
        { name: "Yozgat Novada", goal: 1375000 },
        { name: "Ankara Forum", goal: 1375000 },

        { name: "Afyon Park Avm", goal: 1375000 },
        { name: "İzmit 41 Burda", goal: 1375000 },
        { name: "Sakarya Adapazarı Agora", goal: 1375000 },
        { name: "Sakarya Adapazarı Ada Avm", goal: 1375000 },
        { name: "Bursa Zafer Plaza", goal: 1400000 },
        { name: "Bursa Özdilek Park", goal: 1400000 },
        { name: "İzmir Optimum", goal: 1400000 },
        { name: "İstanbul City Center", goal: 1400000 },

        { name: "İstanbul Maltepe Park", goal: 1400000 },

        { name: "Kocaeli Gebze Center", goal: 1400000 },
        { name: "İzmir Agora", goal: 1600000 },
        { name: "İzmir West Park", goal: 1600000 },
        { name: "Kayseri Forum Avm", goal: 1600000 },
        { name: "İstanbul Kale Center Outlet", goal: 1600000 },
        { name: "Çorum Ahl Park", goal: 1600000 },
        { name: "Hatay İskenderun Primemall", goal: 1750000 },
        { name: "İstanbul Trump Tower Avm", goal: 1750000 },
        { name: "Çankırı Yunus Avm", goal: 1750000 },
        { name: "Antalya Özdilek Park", goal: 1750000 },
        { name: "Ankara Optimum", goal: 1750000 },
        { name: "Ankara Nata Vega", goal: 1750000 },
        { name: "Ankara Vega Subayevleri", goal: 1750000 },
        { name: "Çanakkale Kipa Avm", goal: 1750000 },
        { name: "Samsun Piazza", goal: 1825000 }
    ];

    // Lig tanımları
    const platinum = storesData.filter(s => s.goal >= 1375000);
    const gold = storesData.filter(s => s.goal >= 1185000 && s.goal < 1375000);
    const silver = storesData.filter(s => s.goal < 1185000);

    // Büyükten küçüğe sırala
    const sortDesc = (a,b) => b.goal - a.goal;
    platinum.sort(sortDesc);
    gold.sort(sortDesc);
    silver.sort(sortDesc);

    // İlerleme çubuğu (şimdilik %0, yeşil renk)
    function renderProgressBar() {
        return `
            <div class="progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-fill" style="width:0%;"></div>
                </div>
                <span class="percentage-text">%0</span>
            </div>
        `;
    }

    function renderLeague(leagueKey, teams, iconHtml, colorClass) {
        let title = "", badge = "";
        if (leagueKey === 'platinum') {
            title = "Platin Lig";
            badge = "💎 ZİRVE LİG";
        } else if (leagueKey === 'gold') {
            title = "Altın Lig";
            badge = "🏆 YÜKSELEN LİG";
        } else {
            title = "Gümüş Lig";
            badge = "🌿 GELİŞİM LİGİ";
        }

        const teamItems = teams.map((team, idx) => {
            let rankIcon = "";
            if (idx === 0) rankIcon = '<i class="fas fa-crown" style="color:#d4af37; font-size:0.9rem;"></i>';
            else if (idx === 1) rankIcon = '<i class="fas fa-medal" style="color:#8c97a6;"></i>';
            else if (idx === 2) rankIcon = '<i class="fas fa-medal" style="color:#cd7f32;"></i>';
            else rankIcon = `<span class="badge-rank">#${idx+1}</span>`;

            return `
                <div class="team-row">
                    <div class="team-name">
                        ${rankIcon}
                        <span>${team.name}</span>
                    </div>
                    ${renderProgressBar()}
                </div>
            `;
        }).join('');

        return `
            <div class="league-card ${colorClass}">
                <div class="league-header">
                    <div class="league-icon">${iconHtml}</div>
                    <div class="league-title">
                        <h2>${title}</h2>
                        <span>${badge} • ${teams.length} Mağaza</span>
                    </div>
                </div>
                <div class="team-list">
                    ${teamItems.length ? teamItems : '<div style="text-align:center; padding:24px; color:#667085;">Henüz mağaza bulunmuyor</div>'}
                </div>
            </div>
        `;
    }

    const platinumIcon = `<i class="fas fa-gem"></i>`;
    const goldIcon = `<i class="fas fa-trophy"></i>`;
    const silverIcon = `<i class="fas fa-medal"></i>`;

    document.getElementById('leaguesGrid').innerHTML = `
        ${renderLeague('platinum', platinum, platinumIcon, 'platinum')}
        ${renderLeague('gold', gold, goldIcon, 'gold')}
        ${renderLeague('silver', silver, silverIcon, 'silver')}
    `;

    console.log('Mayıs Ligleri ➤ Platin:', platinum.length, 'Altın:', gold.length, 'Gümüş:', silver.length);
</script>
</body>
</html>
