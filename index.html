    let html = '';
    storesArray.forEach((s, idx) => {
      const progress = s.weeklyTarget > 0 ? Math.min(100, (s.weeklyRevenue / s.weeklyTarget) * 100) : 0;
      const trendIcon = s.trend === 'up' ? '<span class="text-emerald-500 text-sm font-bold">↑</span>' :
                       (s.trend === 'down' ? '<span class="text-rose-500 text-sm font-bold">↓</span>' : '<span class="text-gray-400 text-sm font-bold">→</span>');
      const academyBadge = s.isAcademy ? ' 🎓' : '';
      const isTop3 = idx < 3;
      const rowBg = isTop3 ? 'bg-amber-50 border-amber-200' : 'bg-white';
      const leaderClass = s.isTopLeader ? 'top-leader' : '';
      const nameClass = isTop3 ? 'text-amber-700 font-semibold' : 'text-gray-700';
      html += `
        <div class="store-row ${rowBg} ${leaderClass}">
          <div class="flex items-center gap-1 min-w-0 flex-1">
            <span class="text-xs md:text-sm font-medium truncate ${nameClass}" title="${s.name}">
              ${s.name}${academyBadge}
            </span>
            ${trendIcon}
          </div>
          <div class="flex items-center gap-2 sm:gap-3 progress-area">
            <span class="text-xs font-bold text-gray-800 text-right">%${progress.toFixed(0)}</span>
            <div class="w-12 md:w-16 bg-gray-200 h-1.5 rounded-full overflow-hidden">
              <div class="bg-blue-500 h-1.5 rounded-full" style="width:${progress}%"></div>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  renderLeague('platinumList', platinum);
  renderLeague('goldList', gold);
  renderLeague('silverList', silver);
  renderLeague('bronzeList', bronze);

  // MVP panelini oluştur (her lig için en yüksek yüzde ve hedefi aşan sayısı)
  function buildMVP() {
    const leagues = { 'A': platinum, 'B': gold, 'C': silver, 'D': bronze };
    const leagueInfo = {
      'A': { name: 'Platin', icon: '💎', color: '#94a3b8' },
      'B': { name: 'Altın', icon: '🥇', color: '#eab308' },
      'C': { name: 'Gümüş', icon: '🥈', color: '#94a3b8' },
      'D': { name: 'Bronz', icon: '🥉', color: '#b45309' }
    };
    let mvpHTML = '';
    Object.entries(leagues).forEach(([key, arr]) => {
      // En yüksek hedef gerçekleştirme yüzdesine sahip mağazayı bul
      let best = arr.reduce((prev, curr) => {
        const p = curr.weeklyTarget > 0 ? (curr.weeklyRevenue / curr.weeklyTarget) * 100 : 0;
        const prevP = prev ? (prev.weeklyTarget > 0 ? (prev.weeklyRevenue / prev.weeklyTarget) * 100 : 0) : -1;
        return p > prevP ? curr : prev;
      }, null);
      const bestProgress = best ? (best.weeklyTarget > 0 ? (best.weeklyRevenue / best.weeklyTarget) * 100 : 0) : 0;
      const achievers = arr.filter(s => s.weeklyTarget > 0 && (s.weeklyRevenue / s.weeklyTarget) >= 1).length;
      const info = leagueInfo[key];
      mvpHTML += `
        <div class="bg-white rounded-2xl p-3 card-shadow border-soft" style="border-left: 5px solid ${info.color};">
          <div class="flex items-center gap-2 text-sm md:text-base font-bold text-gray-700">
            <span class="text-xl">${info.icon}</span> ${info.name} MVP
          </div>
          <div class="mt-1 text-xs md:text-sm">
            <span class="font-semibold text-gray-800 truncate block">${best ? best.name : '-'}</span>
            <span class="text-blue-600 font-bold">%${bestProgress.toFixed(0)}</span>
          </div>

          <div class="mt-2 text-[10px] md:text-xs text-gray-500">
            🎯 <span class="font-bold text-emerald-600">${achievers}</span> mağaza hedefi aştı
          </div>
        </div>
      `;
    });
    document.getElementById('mvpContainer').innerHTML = mvpHTML;
  }
  buildMVP();

  // Genel ortalama gerçekleşme yüzdesi
  const avgProgress = stores.length ? stores.reduce((a,b)=>a+(b.weeklyTarget>0?(b.weeklyRevenue/b.weeklyTarget)*100:0),0)/stores.length : 0;
  document.getElementById('kpiContainer').innerHTML = `
    <div class="bg-white rounded-2xl p-3 md:p-5 card-shadow border-soft flex justify-between items-center">
      <div><div class="text-gray-500 text-xs md:text-sm font-medium uppercase">Ort. Hedef Gerçekleşme (Tüm Ligler)</div><div class="text-2xl md:text-3xl font-bold text-gray-800">%${avgProgress.toFixed(1)}</div></div>
      <div class="text-2xl md:text-3xl text-purple-500">📊</div>
    </div>
  `;

})();
</script>
</body>
</html>
